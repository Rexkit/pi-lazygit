name: Package Tarball

# Triggered after the CI/CD workflow completes on main so that it runs even
# when semantic-release creates a release commit with "[skip ci]".
on:
  workflow_run:
    workflows: ['CI/CD']
    types: [completed]
    branches: [main]

# Only one packaging run at a time; never cancel in progress.
concurrency:
  group: package-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  # ─── Resolve the semver tag ──────────────────────────────────────────────────
  # Check whether semantic-release created a version tag for the commit that
  # just finished the CI/CD workflow. If not, every subsequent job is skipped.
  resolve-tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Find semver tag pointing at this commit
        id: tag
        run: |
          git fetch --tags
          # semantic-release creates a new release commit on top of head_sha and
          # places the version tag there. So we look for a semver tag whose direct
          # parent is head_sha, rather than --points-at head_sha itself.
          TAG=$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | while read t; do
            PARENT=$(git rev-parse "${t}^" 2>/dev/null)
            [ "$PARENT" = "${{ github.event.workflow_run.head_sha }}" ] && echo "$t"
          done | head -n1)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ -z "$TAG" ]; then
            echo "No semver tag found for child of ${{ github.event.workflow_run.head_sha }} – skipping."
          else
            echo "Resolved tag: $TAG"
          fi

  # ─── npm tarball packaging ───────────────────────────────────────────────────
  # Builds the Pi package tarball and uploads it as a GitHub release asset.
  package:
    name: Package npm tarball
    needs: resolve-tag
    runs-on: ubuntu-latest
    if: ${{ needs.resolve-tag.outputs.tag != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Pack npm tarball
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: gh release upload ${{ needs.resolve-tag.outputs.tag }} artifacts/*.tgz
